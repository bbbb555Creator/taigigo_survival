<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    
    <title>対義語サバイバル - 全国ランキング版</title>
    
    <link rel="apple-touch-icon" href="icon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500;900&family=Noto+Serif+JP:wght@900&family=Sawarabi+Mincho&display=swap');
        body { 
            font-family: 'Kiwi Maru', serif; 
            background-color: #0f172a;
            background-image: linear-gradient(rgba(15, 23, 42, 0.75), rgba(15, 23, 42, 0.75)), url('bg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #f8fafc;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
            height: 100vh;
        }
        
        .kiwi-maru-900 { font-weight: 900; }
        .noto-serif-900 { font-family: 'Noto Serif JP', serif; font-weight: 900; }
        
        .choice-btn {
            background: rgba(30, 41, 59, 0.7);
            border: 2px solid rgba(52, 211, 153, 0.2);
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            transition: all 0.1s;
            font-size: 1.5rem;
            font-weight: 900;
            padding-top: 1.25rem;
            padding-bottom: 1.25rem;
        }
        
        .choice-btn:active {
            transform: scale(0.95);
            background: rgba(52, 211, 153, 0.3);
            border-color: #34d399;
        }

        /* 歯車の回転アニメーション */
        @keyframes gear-rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .gear-svg {
            animation: gear-rotate 4s linear infinite;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4">

    <div id="title-screen" class="w-full max-w-md text-center">
        <h1 class="text-6xl font-black mb-2 tracking-tighter noto-serif-900">
            <span class="text-emerald-400">対義語</span><br>
            <span class="text-white text-5xl">サバイバル</span>
        </h1>
        <p class="text-slate-400 mb-12 tracking-widest text-sm">VER 3.6.3</p>
        
        <div class="space-y-4">
            <button onclick="selectMode('stage')" class="w-full py-6 bg-emerald-600 hover:bg-emerald-500 text-white rounded-3xl font-black text-2xl shadow-xl transition-all border-b-8 border-emerald-800 active:border-b-0 active:translate-y-2">
                ステージモード
            </button>
            <button onclick="selectMode('endless')" class="w-full py-6 bg-blue-600 hover:bg-blue-500 text-white rounded-3xl font-black text-2xl shadow-xl transition-all border-b-8 border-blue-800 active:border-b-0 active:translate-y-2">
                エンドレスモード
            </button>
        </div>
        
        <button onclick="showRankingFromTitle()" class="mt-8 text-slate-400 font-bold flex items-center justify-center gap-2 w-full">
            <span>🏆 全国ランキング</span>
        </button>
    </div>

    <div id="instruction-screen-stage" class="hidden w-full max-w-md">
        <div class="bg-white/95 rounded-3xl p-8 shadow-2xl border-4 border-emerald-500">
            <h2 class="text-3xl font-black text-emerald-600 mb-6 text-center">ステージモード</h2>
            <div class="text-slate-700 space-y-4 text-lg font-bold">
                <p class="flex items-center gap-3">
                    <span class="bg-emerald-100 text-emerald-600 w-8 h-8 rounded-full flex items-center justify-center">1</span>
                    全10問の対義語に挑戦！
                </p>
                <p class="flex items-center gap-3">
                    <span class="bg-emerald-100 text-emerald-600 w-8 h-8 rounded-full flex items-center justify-center">2</span>
                    ミスするとタイムペナルティ！
                </p>
                <p class="flex items-center gap-3">
                    <span class="bg-emerald-100 text-emerald-600 w-8 h-8 rounded-full flex items-center justify-center">3</span>
                    速度に応じて<span class="text-emerald-600 font-bold">ボーナス</span>加算！
                </p>
            </div>
            <button onclick="startGame()" class="w-full mt-8 py-6 bg-emerald-600 text-white rounded-2xl font-black text-2xl shadow-lg">
                開始する
            </button>
        </div>
    </div>

    <div id="instruction-screen-endless" class="hidden w-full max-w-md">
        <div class="bg-white/95 rounded-3xl p-8 shadow-2xl border-4 border-blue-500">
            <h2 class="text-3xl font-black text-blue-600 mb-6 text-center">エンドレスモード</h2>
            <div class="text-slate-700 space-y-4 text-lg font-bold">
                <p class="flex items-center gap-3">
                    <span class="bg-blue-100 text-blue-600 w-8 h-8 rounded-full flex items-center justify-center">1</span>
                    ミスするまで終わらない！
                </p>
                <p class="flex items-center gap-3">
                    <span class="bg-blue-100 text-blue-600 w-8 h-8 rounded-full flex items-center justify-center">2</span>
                    1問の制限時間は15秒！
                </p>
                <p class="flex items-center gap-3">
                    <span class="bg-blue-100 text-blue-600 w-8 h-8 rounded-full flex items-center justify-center">3</span>
                    回答する速度に応じて<span class="text-blue-600 font-bold">ボーナス</span>が加算！
                </p>
            </div>
            <button onclick="startGame()" class="w-full mt-8 py-6 bg-blue-600 text-white rounded-2xl font-black text-2xl shadow-lg">
                挑戦する
            </button>
        </div>
    </div>

    <div id="game-screen" class="hidden w-full max-w-md relative">
        <div class="flex justify-between items-end mb-2">
            <div id="question-number" class="text-emerald-400 font-black text-xl">第 1 問</div>
            <div id="score-display" class="text-white font-black text-3xl">00000</div>
        </div>
        <div class="h-2 w-full bg-slate-700 rounded-full overflow-hidden mb-8">
            <div id="progress-bar" class="h-full bg-gradient-to-r from-emerald-400 to-cyan-400 transition-all duration-300"></div>
        </div>

        <div id="question-container" class="bg-white/95 rounded-3xl p-8 mb-8 shadow-2xl relative min-h-[300px] flex flex-col justify-center border-4 border-slate-700">
            <div class="flex justify-center gap-12 mb-2">
                <svg class="gear-svg w-8 h-8 text-yellow-600 fill-current" viewBox="0 0 24 24">
                    <path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.35 3.65c-.01-.11-.02-.22-.05-.33l2.45-1.92-2.31-4-2.81 1.13c-.19-.15-.39-.29-.6-.42l-.43-3.02h-4.61l-.43 3.02c-.21.13-.41.27-.6.42l-2.81-1.13-2.31 4 2.45 1.92c-.03.11-.04.22-.05.33l-2.45 1.92 2.31 4 2.81-1.13c.19.15.39.29.6.42l.43 3.02h4.61l.43 3.02c.21.13.41.27.6.42l2.81 1.13 2.31-4-2.45-1.92z"/>
                </svg>
                <svg class="gear-svg w-8 h-8 text-yellow-600 fill-current" viewBox="0 0 24 24" style="animation-direction: reverse;">
                    <path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.35 3.65c-.01-.11-.02-.22-.05-.33l2.45-1.92-2.31-4-2.81 1.13c-.19-.15-.39-.29-.6-.42l-.43-3.02h-4.61l-.43 3.02c-.21.13-.41.27-.6.42l-2.81-1.13-2.31 4 2.45 1.92c-.03.11-.04.22-.05.33l-2.45 1.92 2.31 4 2.81-1.13c.19.15.39.29.6.42l.43 3.02h4.61l.43 3.02c.21.13.41.27.6.42l2.81 1.13 2.31-4-2.45-1.92z"/>
                </svg>
            </div>
            
            <div id="word-display" class="text-7xl font-black text-slate-800 text-center noto-serif-900 tracking-widest mb-4"></div>
            <div class="h-1 w-16 bg-emerald-500 mx-auto rounded-full"></div>
        </div>

        <div id="choices-grid" class="grid grid-cols-2 gap-4">
            <button onclick="checkAnswer(0)" class="choice-btn rounded-2xl py-8"></button>
            <button onclick="checkAnswer(1)" class="choice-btn rounded-2xl py-8"></button>
            <button onclick="checkAnswer(2)" class="choice-btn rounded-2xl py-8"></button>
            <button onclick="checkAnswer(3)" class="choice-btn rounded-2xl py-8"></button>
        </div>

        <div id="feedback-correct" class="hidden absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 pointer-events-none z-50">
            <div class="text-emerald-400 text-9xl font-black opacity-80 scale-150">◯</div>
        </div>
        <div id="feedback-wrong" class="hidden absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 pointer-events-none z-50">
            <div class="text-rose-500 text-9xl font-black opacity-80 scale-150">×</div>
        </div>
    </div>

    <div id="result-screen" class="hidden w-full max-w-md">
        <div class="bg-white/95 rounded-3xl p-8 shadow-2xl text-center border-4 border-slate-700">
            <h2 class="text-2xl font-black text-slate-500 mb-2">RESULT</h2>
            <div id="final-score" class="text-7xl font-black text-slate-800 mb-8">0</div>
            
            <div id="ranking-registration" class="bg-slate-100 rounded-2xl p-6 mb-8">
                <p class="text-slate-600 font-bold mb-4">全国ランキングに登録</p>
                <input type="text" id="player-name" placeholder="名前を入力（最大8文字）" maxlength="8" 
                    class="w-full p-4 rounded-xl border-2 border-slate-300 mb-4 text-center text-lg font-bold focus:border-emerald-500 outline-none">
                <button id="submit-btn" onclick="saveScore()" class="w-full py-4 bg-emerald-600 text-white rounded-xl font-black text-xl shadow-lg">
                    スコアを送信
                </button>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <button onclick="location.reload()" class="py-4 bg-slate-700 text-white rounded-xl font-black text-lg">
                    最初に戻る
                </button>
                <button onclick="showRankingFromTitle()" class="py-4 bg-blue-600 text-white rounded-xl font-black text-lg">
                    ランキング
                </button>
            </div>
        </div>
    </div>

    <div id="ranking-screen" class="hidden w-full max-w-md">
        <div class="bg-white/95 rounded-3xl p-8 shadow-2xl border-4 border-slate-700">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-3xl font-black text-slate-800">RANKING</h2>
                <div class="flex gap-2">
                    <button id="rank-tab-stage" onclick="switchRankingTab('stage')" class="px-3 py-1 rounded-full text-xs font-black bg-emerald-500 text-white">STAGE</button>
                    <button id="rank-tab-endless" onclick="switchRankingTab('endless')" class="px-3 py-1 rounded-full text-xs font-black bg-slate-200 text-slate-600">ENDLESS</button>
                </div>
            </div>
            
            <div id="ranking-list" class="space-y-3 mb-8 max-h-[40vh] overflow-y-auto pr-2 custom-scrollbar">
                <div class="text-center py-10 text-slate-400 font-bold italic">Loading...</div>
            </div>

            <div class="flex flex-col gap-4">
                <button onclick="showPwaManual()" class="text-emerald-600 font-bold text-sm">
                    💡 アプリとして保存する方法
                </button>
                <button onclick="location.reload()" class="w-full py-6 bg-slate-700 text-white rounded-2xl font-black text-2xl">
                    戻る
                </button>
            </div>
        </div>
    </div>

    <script>
        // 設定
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbzfUj7GqXN0hQhE7xY0uQ_f80YyI4v6Y7x9Y8Y8Y8Y8Y8Y8Y8Y8/exec'; // ここにURLを入れる
        
        const data = [
            {w:"拡大",a:"縮小",c:["膨張","延長","増大"]},
            {w:"需要",a:"供給",c:["消費","売買","流通"]},
            {w:"具体的",a:"抽象的",c:["一般的","客観的","包括的"]},
            {w:"主観的",a:"客観的",c:["相対的","絶対的","個性的"]},
            {w:"原因",a:"結果",c:["理由","動機","背景"]},
            {w:"理想",a:"現実",c:["夢想","空想","希望"]},
            {w:"肯定",a:"否定",c:["非難","拒絶","反対"]},
            {w:"楽観",a:"悲観",c:["絶望","期待","用心"]},
            {w:"保守",a:"革新",c:["前進","変化","維持"]},
            {w:"複雑",a:"単純",c:["容易","明快","簡素"]},
            {w:"集中",a:"分散",c:["拡散","離散","分離"]},
            {w:"絶対",a:"相対",c:["限定","比較","個別"]},
            {w:"義務",a:"権利",c:["責任","資格","特権"]},
            {w:"偶然",a:"必然",c:["意図","目的","運命"]},
            {w:"特殊",a:"普遍",c:["普通","一般","共通"]},
            {w:"主観",a:"客観",c:["事実","中立","真実"]},
            {w:"需要",a:"供給",c:["売却","譲渡","生産"]},
            {w:"積極的",a:"消極的",c:["受動的","否定的","保守的"]},
            {w:"垂直",a:"水平",c:["平行","斜面","直角"]},
            {w:"上昇",a:"下降",c:["衰退","停滞","後退"]},
            {w:"勝利",a:"敗北",c:["失敗","落選","降伏"]},
            {w:"原因",a:"結果",c:["事象","産物","余波"]},
            {w:"固定",a:"流動",c:["変化","移動","不安定"]},
            {w:"質的",a:"量的",c:["数的","計量的","体積的"]},
            {w:"直接",a:"間接",c:["仲介","経由","迂回"]},
            {w:"文明",a:"野蛮",c:["未開","原始","混沌"]},
            {w:"供給",a:"需要",c:["消費","要求","不足"]},
            {w:"理論",a:"実践",c:["行動","経験","事実"]},
            {w:"内向的",a:"外向的",c:["積極的","社交的","能動的"]},
            {w:"建設的",a:"破壊的",c:["否定的","絶望的","退廃的"]}
        ];

        let currentMode = '';
        let currentQuestion = 0;
        let score = 0;
        let timeLeft = 100;
        let timer = null;
        let gameActive = false;
        let questions = [];
        let startTime = 0;

        function selectMode(mode) {
            currentMode = mode;
            document.getElementById('title-screen').classList.add('hidden');
            document.getElementById(mode === 'stage' ? 'instruction-screen-stage' : 'instruction-screen-endless').classList.remove('hidden');
        }

        function startGame() {
            document.getElementById('instruction-screen-stage').classList.add('hidden');
            document.getElementById('instruction-screen-endless').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            
            currentQuestion = 0;
            score = 0;
            gameActive = true;
            questions = [...data].sort(() => Math.random() - 0.5);
            
            if (currentMode === 'stage') {
                questions = questions.slice(0, 10);
                timeLeft = 100;
            } else {
                timeLeft = 15;
            }
            
            updateScore();
            nextQuestion();
            startTimer();
        }

        function startTimer() {
            if (timer) clearInterval(timer);
            startTime = Date.now();
            
            timer = setInterval(() => {
                if (!gameActive) return;
                
                if (currentMode === 'stage') {
                    // ステージモードは時間経過による減点はないが、
                    // 進捗バーとして残り時間を表示（100から徐々に減る演出）
                    timeLeft -= 0.1;
                    if (timeLeft <= 0) timeLeft = 0;
                } else {
                    timeLeft -= 0.1;
                    if (timeLeft <= 0) {
                        endGame();
                        return;
                    }
                }
                updateProgressBar();
            }, 100);
        }

        function updateProgressBar() {
            const bar = document.getElementById('progress-bar');
            let percentage = 0;
            if (currentMode === 'stage') {
                percentage = (currentQuestion / questions.length) * 100;
            } else {
                percentage = (timeLeft / 15) * 100;
            }
            bar.style.width = `${percentage}%`;
        }

        function nextQuestion() {
            if (currentMode === 'stage' && currentQuestion >= questions.length) {
                endGame();
                return;
            }

            const q = questions[currentQuestion % questions.length];
            document.getElementById('question-number').textContent = `第 ${currentQuestion + 1} 問`;
            document.getElementById('word-display').textContent = q.w;

            const choices = [q.a, ...q.c].sort(() => Math.random() - 0.5);
            const buttons = document.querySelectorAll('.choice-btn');
            
            buttons.forEach((btn, i) => {
                btn.textContent = choices[i];
                btn.dataset.correct = choices[i] === q.a;
            });

            if (currentMode === 'endless') timeLeft = 15;
            updateProgressBar();
        }

        function checkAnswer(index) {
            if (!gameActive) return;
            
            const btn = document.querySelectorAll('.choice-btn')[index];
            const isCorrect = btn.dataset.correct === 'true';
            
            if (isCorrect) {
                showFeedback(true);
                // スコア計算: 基本点1000 + 残り時間ボーナス
                let bonus = 0;
                if (currentMode === 'endless') {
                    bonus = Math.floor(timeLeft * 100);
                } else {
                    // ステージモードは回答の速さでボーナス
                    const timeTaken = (Date.now() - startTime) / 1000;
                    bonus = Math.max(0, Math.floor(500 - timeTaken * 50));
                }
                score += 1000 + bonus;
                currentQuestion++;
                updateScore();
                nextQuestion();
                startTime = Date.now(); // 次の問題の計測開始
            } else {
                showFeedback(false);
                if (currentMode === 'stage') {
                    score = Math.max(0, score - 500);
                    updateScore();
                } else {
                    endGame();
                }
            }
        }

        function showFeedback(isCorrect) {
            const el = document.getElementById(isCorrect ? 'feedback-correct' : 'feedback-wrong');
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 500);
        }

        function updateScore() {
            document.getElementById('score-display').textContent = score.toString().padStart(5, '0');
        }

        function endGame() {
            gameActive = false;
            clearInterval(timer);
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-score').textContent = score.toLocaleString();
            
            // 前回の名前があれば自動入力
            const savedName = localStorage.getItem('player_name');
            if (savedName) document.getElementById('player-name').value = savedName;
        }

        async function saveScore() {
            const name = document.getElementById('player-name').value.trim();
            if (!name) {
                alert('名前を入力してください');
                return;
            }
            if (!GAS_URL) {
                alert('ランキング送信先が設定されていません');
                return;
            }

            localStorage.setItem('player_name', name);
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.textContent = '送信中...';

            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: name,
                        score: score,
                        mode: currentMode
                    })
                });
                alert('スコアを送信しました！');
                showRankingFromTitle();
            } catch (error) {
                console.error('Error:', error);
                alert('送信に失敗しました');
                btn.disabled = false;
                btn.textContent = 'スコアを送信';
            }
        }

        async function fetchRanking(mode) {
            const list = document.getElementById('ranking-list');
            list.innerHTML = '<div class="text-center py-10 text-slate-400 font-bold italic animate-pulse">Loading...</div>';
            
            try {
                const response = await fetch(`${GAS_URL}?mode=${mode}`);
                const data = await response.json();
                
                list.innerHTML = '';
                if (data.length === 0) {
                    list.innerHTML = '<div class="text-center py-10 text-slate-400">データがありません</div>';
                    return;
                }

                data.forEach((item, i) => {
                    const rank = i + 1;
                    let rankClass = 'bg-slate-100 text-slate-600';
                    if (rank === 1) rankClass = 'bg-yellow-400 text-white shadow-md scale-105';
                    if (rank === 2) rankClass = 'bg-slate-300 text-white';
                    if (rank === 3) rankClass = 'bg-amber-600 text-white';
                    
                    const row = document.createElement('div');
                    row.className = `flex items-center gap-4 p-4 rounded-2xl ${rankClass} transition-all`;
                    row.innerHTML = `
                        <div class="text-xl font-black w-8 text-center">${rank}</div>
                        <div class="flex-1 font-bold truncate text-lg">${item.name}</div>
                        <div class="text-xl font-black">${parseInt(item.score).toLocaleString()}</div>
                    `;
                    list.appendChild(row);
                });
            } catch (error) {
                list.innerHTML = '<div class="text-center py-10 text-rose-400">データの取得に失敗しました</div>';
            }
        }

        function switchRankingTab(mode) {
            const stageBtn = document.getElementById('rank-tab-stage');
            const endlessBtn = document.getElementById('rank-tab-endless');
            
            if (mode === 'stage') {
                stageBtn.className = 'px-4 py-2 rounded-full text-sm font-black bg-emerald-500 text-white shadow-lg';
                endlessBtn.className = 'px-4 py-2 rounded-full text-sm font-black bg-slate-200 text-slate-600';
            } else {
                endlessBtn.className = 'px-4 py-2 rounded-full text-sm font-black bg-blue-500 text-white shadow-lg';
                stageBtn.className = 'px-4 py-2 rounded-full text-sm font-black bg-slate-200 text-slate-600';
            }
            fetchRanking(mode);
        }

        function showRankingFromTitle() {
            document.getElementById('title-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('ranking-screen').classList.remove('hidden');
            switchRankingTab('stage');
        }

        function showPwaManual() {
            const isIos = /iPad|iPhone|iPod/.test(navigator.userAgent);
            const ov = document.createElement('div');
            ov.id = "pwa-overlay";
            ov.className = "fixed inset-0 bg-slate-950/90 z-[100] flex items-center justify-center p-6";
            
            const card = document.createElement('div');
            card.className = "bg-slate-800 rounded-3xl p-8 max-w-sm w-full border border-slate-700 shadow-2xl text-center";
            
            let html = "";
            if (isIos) {
                html = `
                    <div class="text-left text-base space-y-4 px-2">
                        <p class="font-bold text-emerald-400 text-center text-xl mb-4">iPhone / Safari の方</p>
                        <div class="flex items-center gap-3">
                            <span class="bg-slate-700 w-6 h-6 rounded-full flex items-center justify-center text-xs">1</span>
                            <p>下の<span class="bg-slate-700 px-2 py-1 rounded">共有ボタン（<svg class="w-4 h-4 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"></path></svg>）</span>を押す</p>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="bg-slate-700 w-6 h-6 rounded-full flex items-center justify-center text-xs">2</span>
                            <p><span class="text-white font-bold">「ホーム画面に追加」</span>を選択</p>
                        </div>
                    </div>
                `;
            } else {
                html = `
                    <div class="text-left text-base space-y-4 px-2">
                        <p class="font-bold text-emerald-400 text-center text-xl mb-4">Android / Chrome の方</p>
                        <div class="flex items-center gap-3">
                            <span class="bg-slate-700 w-6 h-6 rounded-full flex items-center justify-center text-xs">1</span>
                            <p>右上の<span class="bg-slate-700 px-2 py-1 rounded">三点リーダー（⋮）</span>を押す</p>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="bg-slate-700 w-6 h-6 rounded-full flex items-center justify-center text-xs">2</span>
                            <p><span class="text-white font-bold">「アプリをインストール」</span>または<span class="text-white font-bold\">「ホーム画面に追加」</span>を選択</p>
                        </div>
                    </div>
                `;
            }
            
            card.innerHTML = html + `
                <button onclick="document.getElementById('pwa-overlay').remove()" class="w-full py-4 bg-emerald-600 text-white rounded-xl font-black text-xl shadow-lg mt-8">
                    わかった！
                </button>
            `;
            ov.appendChild(card);
            document.body.appendChild(ov);
        }
    </script>
</body>
</html>
