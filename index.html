<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    
    <title>対義語サバイバル - Ranking Edition</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500;900&family=Noto+Serif+JP:wght@900&family=Sawarabi+Mincho&display=swap');
        
        body { 
            font-family: 'Kiwi Maru', serif; 
            background-color: #0f172a; 
            color: #f8fafc; 
            touch-action: manipulation; 
            user-select: none; 
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }

        #game-container {
            min-height: 100vh;
            min-height: -webkit-fill-available;
            display: flex;
            flex-direction: column;
        }

        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        #word-box {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.8) 0%, rgba(15, 23, 42, 0.9) 100%);
            border: 4px solid #34d399;
            box-shadow: 0 0 30px rgba(52, 211, 153, 0.3);
            border-radius: 2rem;
        }

        .choice-btn {
            background: rgba(30, 41, 59, 0.7);
            border: 2px solid rgba(52, 211, 153, 0.2);
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            transition: all 0.1s;
        }

        .choice-btn:active { transform: scale(0.95); background: #34d399; color: #0f172a; }
        
        .feedback-pop {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 100;
            animation: feedbackAnim 0.8s cubic-bezier(0.17, 0.67, 0.83, 0.67) forwards;
        }

        @keyframes feedbackAnim {
            0% { opacity: 0; transform: translate(-50%, -30%) scale(0.5); }
            20% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            80% { opacity: 1; transform: translate(-50%, -60%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -80%) scale(0.8); }
        }

        .rank-row {
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: background 0.3s;
        }
        .rank-row:last-child { border-bottom: none; }
    </style>
</head>
<body>
    <div id="game-container" class="w-full relative overflow-hidden">
        
        <div class="absolute top-4 left-4 z-50 text-[10px] text-slate-500 font-mono opacity-50">
            v1.1.0
        </div>

        <script>
            // GASのURLを反映
            const GAS_URL = "https://script.google.com/macros/s/AKfycbyFbiDDP-u2nUyE1eDMTdKJ48cdMUwyxzaTAHbc1DKA5wrXSrAlEtN-s79-SJ9vIa_v2g/exec"; 
        </script>

        <div id="fixed-mute-btn" class="absolute top-4 right-4 z-50">
            <button onclick="toggleMute()" class="p-2 bg-slate-800/60 rounded-full text-slate-400 border border-slate-700 active:scale-95 transition-all">
                <svg class="volume-on h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.686-3.686a1 1 0 011.111-.238zm5.459 2.158a1 1 0 011.414 0 7.5 7.5 0 010 10.608 1 1 0 01-1.414-1.414 5.5 5.5 0 000-7.78 1 1 0 010-1.414zm-2.828 2.828a1 1 0 011.414 0 3.5 3.5 0 010 4.95" /></svg>
                <svg class="volume-off h-5 w-5 hidden" viewBox="0 0 20 20" fill="currentColor"><path d="M9.383 3.076A1 1 0 0110 4v12" /></svg>
            </button>
        </div>

        <div id="title-screen" class="flex-grow flex flex-col items-center justify-center text-center py-20 px-8 fade-in">
            <div class="text-6xl font-black text-emerald-400 mb-2 drop-shadow-[0_0_20px_rgba(52,211,153,0.5)]">対義語</div>
            <div class="text-4xl font-black text-white tracking-widest mb-12">サバイバル</div>
            
            <div class="w-full max-w-xs space-y-4">
                <button onclick="showInstructions()" class="w-full py-5 bg-emerald-600 hover:bg-emerald-500 rounded-2xl text-white font-black text-xl shadow-lg active:scale-95 transition-all">
                    挑戦を始める
                </button>
                <button onclick="showPreRanking()" class="w-full py-4 bg-slate-800 hover:bg-slate-700 rounded-2xl text-slate-300 font-bold text-lg border border-slate-700 active:scale-95 transition-all">
                    🏆 ランキングを見る
                </button>
            </div>
        </div>

        <div id="instruction-screen" class="hidden flex-grow flex flex-col items-center justify-center p-6 fade-in">
            <h2 class="text-4xl font-black text-emerald-400 mb-8">遊び方</h2>
            <div class="bg-slate-800/50 rounded-3xl p-6 border border-slate-700 text-slate-300 space-y-4 mb-10 w-full max-w-sm text-left">
                <p>・全60問のノンストップバトル！</p>
                <p>・1問ミスで即ゲームオーバー。</p>
                <p>・速く答えるほど高スコア獲得！</p>
                <p>・15問ごとにステージクリア画面が出現。</p>
            </div>
            <button onclick="showNicknameInput()" class="w-full max-w-xs py-5 bg-emerald-600 rounded-2xl text-white font-black text-xl shadow-lg active:scale-95">
                次へ進む
            </button>
        </div>

        <div id="nickname-screen" class="hidden flex-grow flex flex-col items-center justify-center p-8 fade-in">
            <h2 class="text-3xl font-black text-white mb-8">ニックネームを入力</h2>
            <input type="text" id="player-name" maxlength="10" placeholder="ななし" 
                class="w-full max-w-xs py-5 px-6 bg-slate-800 border-2 border-emerald-500 rounded-2xl text-white text-center text-2xl mb-8 focus:outline-none focus:ring-4 focus:ring-emerald-500/20 shadow-2xl">
            <button onclick="initialStart()" class="w-full max-w-xs py-5 bg-gradient-to-r from-emerald-500 to-blue-600 rounded-2xl text-white font-black text-2xl shadow-xl active:scale-95 transition-all">
                ゲーム開始！
            </button>
        </div>

        <div id="game-screen" class="hidden flex-grow flex flex-col p-6 fade-in relative">
            <div id="feedback-layer"></div>
            <div class="flex justify-between items-center mb-4 pt-10">
                <div id="level-badge" class="px-4 py-1.5 text-white text-xs rounded-full font-bold shadow-lg"></div>
                <div class="text-right">
                    <div class="text-[10px] text-slate-400 uppercase font-bold tracking-widest">Total Score</div>
                    <div id="total-score" class="text-2xl font-black text-yellow-400 leading-none">0</div>
                </div>
            </div>
            <div class="relative w-full bg-slate-800/60 h-3 rounded-full overflow-hidden border border-slate-700">
                <div id="progress-bar" class="bg-gradient-to-r from-blue-500 to-emerald-500 h-full transition-all duration-300" style="width: 0%"></div>
            </div>
            <div class="text-center my-6 flex-grow flex flex-col justify-center">
                <div class="text-slate-400 text-sm font-bold tracking-widest uppercase">Question <span id="q-num" class="text-white text-xl">1</span> / 60</div>
                <div id="word-box" class="w-full py-12 px-4 mx-auto mt-6 flex flex-col items-center justify-center relative">
                    <div id="question-word" class="text-5xl md:text-6xl font-black text-white drop-shadow-lg">---</div>
                </div>
            </div>
            <div id="choices-grid" class="grid grid-cols-1 gap-4 mt-auto mb-8"></div>
        </div>

        <div id="overlay" class="hidden absolute inset-0 z-50 flex items-center justify-center bg-slate-950/98 p-6 backdrop-blur-xl text-center overflow-y-auto">
            <div id="result-content" class="w-full max-w-sm fade-in flex flex-col items-center py-10">
                <div id="overlay-icon" class="text-7xl mb-4"></div>
                <div id="overlay-message" class="text-2xl font-bold mb-4 text-slate-200 leading-tight"></div>
                
                <div id="review-box" class="hidden w-full p-6 mb-6 bg-rose-950/30 border border-rose-500/50 rounded-3xl text-left">
                    <div class="text-rose-400 text-[10px] font-bold uppercase mb-1">正解の確認</div>
                    <div class="flex items-center justify-between">
                        <div id="rev-q" class="text-2xl font-black text-white">---</div>
                        <div class="text-rose-400 mx-2">⇔</div>
                        <div id="rev-a" class="text-2xl font-black text-emerald-400 underline">---</div>
                    </div>
                </div>

                <div id="score-report" class="w-full mb-8 p-6 bg-slate-900/50 rounded-3xl border border-slate-800">
                    <div class="text-slate-400 text-xs uppercase mb-1">Score</div>
                    <div id="final-score" class="text-5xl font-black text-yellow-400 mb-1">0</div>
                    <div id="ranking-status" class="text-emerald-500 text-xs font-bold">---</div>
                </div>

                <div id="ranking-container" class="w-full mb-8">
                    <h3 class="text-sm font-black text-slate-400 mb-4 tracking-[0.3em] uppercase flex items-center justify-center">
                        <span class="h-px w-8 bg-slate-800 mr-2"></span>
                        National Top 10
                        <span class="h-px w-8 bg-slate-800 ml-2"></span>
                    </h3>
                    <div id="ranking-list" class="bg-slate-900/30 rounded-2xl border border-slate-800/50 overflow-hidden text-left min-h-[100px]">
                        <div class="p-8 text-center text-slate-500 text-sm italic">読み込み中...</div>
                    </div>
                </div>

                <button id="action-btn" class="w-full py-6 bg-emerald-600 rounded-3xl font-black text-2xl shadow-xl active:scale-95 transition-all text-white">アクション</button>
                <button onclick="location.reload()" class="mt-4 w-full py-3 text-slate-500 font-bold text-sm">タイトルへ戻る</button>
            </div>
        </div>
    </div>

    <audio id="bgm-stage1" loop preload="auto"><source src="1.mp3" type="audio/mpeg"></audio>
    <audio id="bgm-stage2" loop preload="auto"><source src="2.mp3" type="audio/mpeg"></audio>
    <audio id="bgm-stage3" loop preload="auto"><source src="3.mp3" type="audio/mpeg"></audio>
    <audio id="bgm-stage4" loop preload="auto"><source src="4.mp3" type="audio/mpeg"></audio>
    <audio id="bgm-ending" loop preload="auto"><source src="end.mp3" type="audio/mpeg"></audio>
    <audio id="sfx-correct" preload="auto"><source src="maru.mp3" type="audio/mpeg"></audio>
    <audio id="sfx-wrong" preload="auto"><source src="batu.mp3" type="audio/mpeg"></audio>

        const STAGES = [
            { id: 1, name: "初級：日常語", key: 'elementary', color: "bg-blue-600", bgm: "bgm-stage1" },
            { id: 2, name: "中級：概念語", key: 'intermediate', color: "bg-emerald-600", bgm: "bgm-stage2" },
            { id: 3, name: "上級：難読熟語", key: 'advanced', color: "bg-amber-600", bgm: "bgm-stage3" },
            { id: 4, name: "番外：カタカナ語", key: 'katakana', color: "bg-rose-600", bgm: "bgm-stage4" }
        ];

        let quizList = [];
        let currentIndex = 0;
        let score = 0;
        let playerName = "ななし";
        let questionStartTime = 0;
        let currentBgm = null;
        let isMuted = false;

        function playBgm(id) {
            const nextBgm = document.getElementById(id);
            if (!nextBgm || currentBgm === nextBgm) return;
            if (currentBgm) { currentBgm.pause(); currentBgm.currentTime = 0; }
            currentBgm = nextBgm;
            currentBgm.volume = 0.3;
            if (!isMuted) currentBgm.play().catch(e => {});
        }

        function playSfx(id) {
            if (isMuted) return;
            const sfx = document.getElementById(id);
            if (sfx) { sfx.currentTime = 0; sfx.volume = 0.5; sfx.play().catch(e => {}); }
        }

        function toggleMute() {
            isMuted = !isMuted;
            document.querySelectorAll('.volume-on').forEach(el => el.classList.toggle('hidden', isMuted));
            document.querySelectorAll('.volume-off').forEach(el => el.classList.toggle('hidden', !isMuted));
            if (currentBgm) isMuted ? currentBgm.pause() : currentBgm.play().catch(e => {});
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function showInstructions() {
            document.getElementById('title-screen').classList.add('hidden');
            document.getElementById('instruction-screen').classList.remove('hidden');
        }

        function showNicknameInput() {
            document.getElementById('instruction-screen').classList.add('hidden');
            document.getElementById('nickname-screen').classList.remove('hidden');
        }

        // --- 事前ランキング表示機能 ---
        async function showPreRanking() {
            const ov = document.getElementById('overlay');
            ov.classList.remove('hidden');
            document.getElementById('ranking-container').classList.remove('hidden');
            document.getElementById('score-report').classList.add('hidden'); // スコアは隠す
            document.getElementById('review-box').classList.add('hidden');
            
            document.getElementById('overlay-icon').textContent = "🌍";
            document.getElementById('overlay-message').textContent = "全国ランキング";
            
            const bt = document.getElementById('action-btn');
            bt.textContent = "閉じる";
            bt.onclick = () => ov.classList.add('hidden');

            fetchRanking();
        }

        async function fetchRanking() {
            const list = document.getElementById('ranking-list');
            if (!GAS_URL.includes("https")) {
                list.innerHTML = `<div class="p-4 text-center text-rose-400">URLが設定されていません</div>`;
                return;
            }
            try {
                const res = await fetch(GAS_URL);
                const data = await res.json();
                renderRanking(data);
            } catch (e) {
                list.innerHTML = `<div class="p-4 text-center text-rose-400">通信エラー</div>`;
            }
        }

        function initialStart() {
            const nameInput = document.getElementById('player-name').value.trim();
            playerName = nameInput || "ななし";
            startGame();
        }

        function startGame() {
            document.getElementById('nickname-screen').classList.add('hidden');
            document.getElementById('overlay').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            
            quizList = [];
            STAGES.forEach(stage => {
                const source = DATA[stage.key];
                const shuffled = shuffle([...source]);
                quizList = quizList.concat(shuffled.slice(0, 15).map(item => ({...item, stage})));
            });

            currentIndex = 0;
            score = 0;
            document.getElementById('total-score').textContent = "0";
            initQuiz();
        }

        function initQuiz() {
            const q = quizList[currentIndex];
            const s = q.stage;
            playBgm(s.bgm);

            document.getElementById('question-word').textContent = q.q;
            document.getElementById('q-num').textContent = currentIndex + 1;
            document.getElementById('progress-bar').style.width = `${(currentIndex / 60) * 100}%`;
            
            const badge = document.getElementById('level-badge');
            badge.textContent = s.name;
            badge.className = `px-4 py-1.5 ${s.color} text-white text-xs rounded-full font-bold shadow-lg`;

            const choices = shuffle([q.a, ...q.d]);
            const grid = document.getElementById('choices-grid');
            grid.innerHTML = '';
            
            choices.forEach(text => {
                const btn = document.createElement('button');
                btn.className = "choice-btn py-5 rounded-2xl text-xl font-bold active:scale-95 transition-all";
                btn.textContent = text;
                btn.onclick = () => checkAnswer(text);
                grid.appendChild(btn);
            });
            questionStartTime = Date.now();
        }

        function checkAnswer(selected) {
            const q = quizList[currentIndex];
            const isCorrect = (selected === q.a);
            
            if (isCorrect) {
                playSfx('sfx-correct');
                const timeTaken = (Date.now() - questionStartTime) / 1000;
                let bonus = 0;
                if (timeTaken < 1.2) bonus = 500;
                else if (timeTaken < 2.5) bonus = 200;

                const points = 1000 + bonus;
                score += points;
                document.getElementById('total-score').textContent = score.toLocaleString();
                showFeedback(points);

                currentIndex++;
                setTimeout(() => {
                    if (currentIndex >= 60) showResult(true);
                    else if (currentIndex % 15 === 0) showStageClear();
                    else initQuiz();
                }, 600);
            } else {
                if (currentBgm) currentBgm.pause();
                playSfx('sfx-wrong');
                showResult(false);
            }
        }

        function showFeedback(points) {
            const layer = document.getElementById('feedback-layer');
            const el = document.createElement('div');
            el.className = `feedback-pop flex flex-col items-center`;
            el.innerHTML = `<div class="text-4xl font-black text-emerald-400 drop-shadow-lg">正解!</div><div class="text-xl font-bold text-white mt-1">+${points}</div>`;
            layer.appendChild(el);
            setTimeout(() => el.remove(), 800);
        }

        function showStageClear() {
            const ov = document.getElementById('overlay');
            ov.classList.remove('hidden');
            document.getElementById('ranking-container').classList.add('hidden');
            document.getElementById('review-box').classList.add('hidden');
            document.getElementById('score-report').classList.remove('hidden');
            document.getElementById('final-score').textContent = score.toLocaleString();
            document.getElementById('ranking-status').textContent = "STAGE CLEAR!";

            document.getElementById('overlay-icon').textContent = "🏅";
            document.getElementById('overlay-message').innerHTML = `ステージクリア！<br>次は ${STAGES[Math.floor(currentIndex/15)].name} だ！`;
            
            const bt = document.getElementById('action-btn');
            bt.textContent = "次のステージへ";
            bt.onclick = () => {
                ov.classList.add('hidden');
                initQuiz();
            };
        }

        async function showResult(isWin) {
            const ov = document.getElementById('overlay');
            ov.classList.remove('hidden');
            document.getElementById('ranking-container').classList.remove('hidden');
            document.getElementById('score-report').classList.remove('hidden');
            document.getElementById('final-score').textContent = score.toLocaleString();

            const m = document.getElementById('overlay-message');
            const ic = document.getElementById('overlay-icon');
            const review = document.getElementById('review-box');
            const status = document.getElementById('ranking-status');
            const bt = document.getElementById('action-btn');

            if (isWin) {
                playBgm('bgm-ending');
                ic.textContent = "👑";
                m.textContent = "完全制覇！君こそ語彙力王だ！";
                review.classList.add('hidden');
                bt.textContent = "もう一度挑戦";
            } else {
                ic.textContent = "💀";
                m.innerHTML = `<span class="text-rose-500">サバイバル失敗...</span><br>記録: ${currentIndex} 問目`;
                const q = quizList[currentIndex];
                document.getElementById('rev-q').textContent = q.q;
                document.getElementById('rev-a').textContent = q.a;
                review.classList.remove('hidden');
                bt.textContent = "1問目からリベンジ";
            }

            bt.onclick = () => startGame();

            // ランキング送信
            if (GAS_URL.includes("https")) {
                status.textContent = "スコアを送信中...";
                try {
                    await fetch(GAS_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name: playerName, score: score })
                    });
                    
                    status.textContent = "ランキングを読み込み中...";
                    const res = await fetch(GAS_URL);
                    const rankingData = await res.json();
                    renderRanking(rankingData);
                    status.textContent = "全国ランキングを更新しました！";
                } catch (e) {
                    status.textContent = "ランキング取得失敗";
                }
            }
        }

        function renderRanking(data) {
            const list = document.getElementById('ranking-list');
            list.innerHTML = data.map((r, i) => `
                <div class="flex justify-between items-center py-3 px-4 rank-row ${r.name === playerName ? 'bg-emerald-500/10' : ''}">
                    <div class="flex items-center">
                        <span class="w-6 text-xs font-black ${i<3 ? 'text-yellow-400' : 'text-slate-500'}">${i+1}</span>
                        <span class="text-sm font-bold text-slate-200">${r.name}</span>
                    </div>
                    <span class="text-sm font-black text-emerald-400 font-mono">${Number(r.score).toLocaleString()}</span>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
