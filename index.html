<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    
    <title>対義語サバイバル - 全国ランキング版</title>
    
    <link rel="apple-touch-icon" href="icon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500;900&family=Noto+Serif+JP:wght@900&family=Sawarabi+Mincho&display=swap');

        body { 
            font-family: 'Kiwi Maru', serif; 
            background-color: #0f172a;
            /* # 壁紙画像の差し込み位置 */
            background-image: linear-gradient(rgba(15, 23, 42, 0.75), rgba(15, 23, 42, 0.75)), url('bg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #f8fafc; 
            touch-action: manipulation;
            user-select: none; 
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }

        #game-container {
            min-height: 100vh;
            min-height: -webkit-fill-available;
            display: flex;
            flex-direction: column;
        }

        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .logo-float { animation: float 4s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        #word-box {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.8) 0%, rgba(15, 23, 42, 0.9) 100%);
            border: 4px solid #34d399;
            box-shadow: 0 0 30px rgba(52, 211, 153, 0.3);
            border-radius: 2rem;
        }

        .choice-btn {
            background: rgba(30, 41, 59, 0.7);
            border: 2px solid rgba(52, 211, 153, 0.2);
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            transition: all 0.1s;
        }

        .choice-btn:active { transform: scale(0.95); background: #34d399; color: #0f172a; }
        
        .feedback-pop {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 100;
            animation: feedbackAnim 0.8s cubic-bezier(0.17, 0.67, 0.83, 0.67) forwards;
        }

        @keyframes feedbackAnim {
            0% { opacity: 0; transform: translate(-50%, -30%) scale(0.5); }
            20% { opacity: 1; transform: translate(-50%, -55%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -70%) scale(0.9); }
        }

        .rank-row {
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: background 0.3s;
        }
        .rank-row:last-child { border-bottom: none; }
    </style>
</head>
<body>
    <div id="game-container" class="w-full relative overflow-hidden">
        <div class="absolute top-4 left-4 z-50 text-[10px] font-mono text-slate-500 tracking-widest pointer-events-none">
            VER 3.0.0
        </div>

        <!-- タイトル画面 -->
        <div id="title-screen" class="flex-grow flex flex-col items-center justify-between text-center py-10 px-8 fade-in relative z-10">
            <div class="w-full flex justify-end">
                <button onclick="toggleMute()" class="p-3 bg-slate-800/90 rounded-full text-slate-400 border border-slate-700">
                    <svg id="title-volume-on" class="h-6 w-6" viewBox="0 0 20 20" fill="currentColor"><path d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.686-3.686a1 1 0 011.111-.238zm5.459 2.158a1 1 0 011.414 0 7.5 7.5 0 010 10.608 1 1 0 01-1.414-1.414 5.5 5.5 0 000-7.78 1 1 0 010-1.414zm-2.828 2.828a1 1 0 011.414 0 3.5 3.5 0 010 4.95" /></svg>
                    <svg id="title-volume-off" class="h-6 w-6 hidden" viewBox="0 0 20 20" fill="currentColor"><path d="M9.383 3.076A1 1 0 0110 4v12" /></svg>
                </button>
            </div>
            
            <div class="flex-grow flex items-center justify-center w-full">
                <img src="logo.png" alt="対義語サバイバル" class="max-w-[280px] logo-float drop-shadow-[0_0_20px_rgba(52,211,153,0.3)]">
            </div>
            
            <div class="w-full max-w-xs space-y-4 mb-6">
                <button onclick="selectMode('stage')" class="w-full active:scale-95 transition-all">
                    <img src="stm.png" alt="ステージモード" class="w-full drop-shadow-lg pointer-events-none">
                </button>
                <button onclick="selectMode('endless')" class="w-full active:scale-95 transition-all">
                    <img src="endless.png" alt="エンドレスモード" class="w-full drop-shadow-lg pointer-events-none">
                </button>
                <button onclick="showInstallGuide()" class="w-full py-4 bg-slate-800/80 border-2 border-slate-600 rounded-2xl text-slate-300 font-bold text-sm active:scale-95 transition-all shadow-lg">
                    アプリとしてダウンロード
                </button>
            </div>
        </div>

        <!-- 遊び方（ステージモード用） -->
        <div id="instruction-screen-stage" class="hidden flex-grow flex flex-col items-center justify-center p-6 fade-in">
            <h2 class="text-4xl font-black text-emerald-400 mb-8">遊び方</h2>
            <div class="bg-slate-900/80 rounded-3xl p-8 border-2 border-emerald-500/30 text-slate-200 space-y-6 mb-10 w-full max-w-sm shadow-2xl backdrop-blur-md">
                <div class="flex items-start gap-4">
                    <span class="bg-emerald-500 text-slate-900 w-6 h-6 rounded-full flex items-center justify-center font-bold flex-shrink-0 mt-0.5">1</span>
                    <p class="leading-relaxed">表示された単語の<span class="text-emerald-400 font-bold">対義語</span>を4択から選んでください。</p>
                </div>
                <div class="flex items-start gap-4">
                    <span class="bg-emerald-500 text-slate-900 w-6 h-6 rounded-full flex items-center justify-center font-bold flex-shrink-0 mt-0.5">2</span>
                    <p class="leading-relaxed">全60問。難易度は徐々に上昇。<br><span class="text-rose-400 font-bold">1問のミス</span>で即終了です。</p>
                </div>
                <div class="flex items-start gap-4">
                    <span class="bg-emerald-500 text-slate-900 w-6 h-6 rounded-full flex items-center justify-center font-bold flex-shrink-0 mt-0.5">3</span>
                    <p class="leading-relaxed">速度に応じて<span class="text-yellow-400 font-bold">ボーナス</span>加算！</p>
                </div>
            </div>
            <button onclick="showNicknameInput()" class="w-full max-w-xs py-5 bg-emerald-600 rounded-2xl text-white font-black text-xl shadow-lg active:scale-95">次へ進む</button>
        </div>

        <!-- 遊び方（エンドレスモード用） -->
        <div id="instruction-screen-endless" class="hidden flex-grow flex flex-col items-center justify-center p-6 fade-in">
            <h2 class="text-4xl font-black text-blue-400 mb-8">エンドレス</h2>
            <div class="bg-slate-900/80 rounded-3xl p-8 border-2 border-blue-500/30 text-slate-200 space-y-6 mb-10 w-full max-w-sm shadow-2xl backdrop-blur-md">
                <div class="flex items-start gap-4">
                    <span class="bg-blue-500 text-slate-900 w-6 h-6 rounded-full flex items-center justify-center font-bold flex-shrink-0 mt-0.5">1</span>
                    <p class="leading-relaxed">表示された単語の<span class="text-blue-400 font-bold">対義語</span>を4択から選んでください。</p>
                </div>
                <div class="flex items-start gap-4">
                    <span class="bg-blue-500 text-slate-900 w-6 h-6 rounded-full flex items-center justify-center font-bold flex-shrink-0 mt-0.5">2</span>
                    <p class="leading-relaxed">問題は全200問。ステージ1～4の問題をランダムで出題。<br>集中力が試される究極の修行です。</p>
                </div>
                <div class="flex items-start gap-4">
                    <span class="bg-blue-500 text-slate-900 w-6 h-6 rounded-full flex items-center justify-center font-bold flex-shrink-0 mt-0.5">3</span>
                    <p class="leading-relaxed">回答する速度に応じて<span class="text-yellow-400 font-bold">ボーナス</span>が加算されます。</p>
                </div>
            </div>
            <button onclick="showNicknameInput()" class="w-full max-w-xs py-5 bg-blue-600 rounded-2xl text-white font-black text-xl shadow-lg active:scale-95">次へ進む</button>
        </div>

        <!-- ニックネーム入力 -->
        <div id="nickname-screen" class="hidden flex-grow flex flex-col items-center justify-center p-8 fade-in">
            <h2 class="text-3xl font-black text-white mb-8 text-center leading-relaxed">あなたの名を<br>刻んでください</h2>
            <input type="text" id="player-name" maxlength="10" placeholder="ニックネームを入力" 
                class="w-full max-w-xs py-5 px-6 bg-slate-800 border-2 border-emerald-500 rounded-2xl text-white text-center text-2xl 
                mb-8 focus:outline-none focus:ring-4 focus:ring-emerald-500/20 shadow-2xl">
            <button onclick="initialStart()" class="w-full max-w-xs py-5 bg-gradient-to-r from-emerald-500 to-blue-600 rounded-2xl text-white font-black text-2xl shadow-xl active:scale-95 transition-all">
                挑戦を開始する
            </button>
        </div>

        <!-- ゲーム画面 -->
        <div id="game-screen" class="hidden flex-grow flex flex-col p-6 fade-in relative">
            <div id="feedback-layer"></div>
            <div class="flex justify-between items-end mb-4 pt-10">
                <div id="level-badge" class="px-4 py-1.5 text-white text-xs rounded-full font-bold shadow-lg"></div>
                <div class="flex items-center gap-4">
                    <button onclick="toggleMute()" class="p-2 bg-slate-800/90 rounded-full text-slate-400 border border-slate-700 shadow-lg active:scale-95 transition-all">
                        <svg id="game-volume-on" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.686-3.686a1 1 0 011.111-.238zm5.459 2.158a1 1 0 011.414 0 7.5 7.5 0 010 10.608 1 1 0 01-1.414-1.414 5.5 5.5 0 000-7.78 1 1 0 010-1.414zm-2.828 2.828a1 1 0 011.414 0 3.5 3.5 0 010 4.95" /></svg>
                        <svg id="game-volume-off" class="h-5 w-5 hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4V5zM23 9l-6 6M17 9l6 6"/></svg>
                    </button>
                    <div class="text-right">
                        <div class="text-[10px] text-slate-400 uppercase font-bold">Total Score</div>
                        <div id="total-score" class="text-2xl font-black text-yellow-400 leading-none">0</div>
                    </div>
                </div>
            </div>
            <div class="relative w-full bg-slate-800/60 h-3 rounded-full overflow-hidden border border-slate-700">
                <div id="progress-bar" class="bg-gradient-to-r from-blue-500 to-emerald-500 h-full transition-all duration-300" style="width: 0%"></div>
            </div>
            <div class="text-center my-6 flex-grow flex flex-col justify-center">
                <div class="text-slate-400 text-sm font-bold tracking-widest uppercase">Question <span id="q-num" class="text-white text-xl">1</span> / <span id="total-q-num">60</span></div>
                <div id="word-box" class="w-full py-12 px-4 mx-auto mt-6 flex flex-col items-center justify-center relative">
                    <div id="question-word" class="text-5xl md:text-6xl font-black text-white drop-shadow-lg">---</div>
                </div>
            </div>
            <div id="choices-grid" class="grid grid-cols-1 gap-4 mt-auto mb-8"></div>
        </div>

        <!-- リザルト・オーバーレイ -->
        <div id="overlay" class="hidden absolute inset-0 z-50 flex items-start justify-center bg-slate-950/98 p-6 backdrop-blur-xl text-center overflow-y-auto">
            <div id="result-content" class="w-full max-w-sm fade-in flex flex-col items-center py-10">
                <div id="overlay-icon" class="text-7xl mb-4"></div>
                <div id="overlay-message" class="text-2xl font-bold mb-4 text-slate-200 leading-tight"></div>
                
                <div id="review-box" class="hidden w-full p-6 mb-6 bg-rose-950/30 border border-rose-500/50 rounded-3xl text-left">
                    <div class="text-rose-400 text-[10px] font-bold uppercase mb-1">正解の確認</div>
                    <div class="flex items-center justify-between">
                        <div id="rev-q" class="text-2xl font-black text-white">---</div>
                        <div class="text-rose-400 mx-2">⇔</div>
                        <div id="rev-a" class="text-2xl font-black text-emerald-400 underline">---</div>
                    </div>
                </div>

                <div id="score-report" class="w-full mb-8 p-6 bg-slate-900/50 rounded-3xl border border-slate-800">
                </div>

                <div id="ranking-container" class="w-full mb-8">
                    <h3 id="ranking-title" class="text-sm font-black text-slate-400 mb-4 tracking-[0.3em] uppercase flex items-center justify-center">
                        <span class="h-px w-8 bg-slate-800 mr-2"></span>
                        National Top 10
                        <span class="h-px w-8 bg-slate-800 ml-2"></span>
                    </h3>
                    <div id="ranking-list" class="bg-slate-900/30 rounded-2xl border border-slate-800/50 overflow-hidden text-left min-h-[100px]">
                    </div>
                </div>

                <button id="action-btn" class="w-full py-6 bg-emerald-600 rounded-3xl font-black text-2xl shadow-xl active:scale-95 transition-all text-white">アクションボタン</button>
                <button onclick="location.reload()" class="mt-4 w-full py-3 text-slate-500 font-bold text-sm">タイトルへ戻る</button>
            </div>
        </div>
    </div>

    <!-- オーディオ要素（省略せずに維持） -->
    <audio id="bgm-stage1" loop preload="auto"><source src="1.mp3" type="audio/mpeg"></audio>
    <audio id="bgm-stage2" loop preload="auto"><source src="2.mp3" type="audio/mpeg"></audio>
    <audio id="bgm-stage3" loop preload="auto"><source src="3.mp3" type="audio/mpeg"></audio>
    <audio id="bgm-stage4" loop preload="auto"><source src="4.mp3" type="audio/mpeg"></audio>
    <audio id="bgm-endless" loop preload="auto"><source src="3.mp3" type="audio/mpeg"></audio>
    <audio id="bgm-ending" loop preload="auto"><source src="end.mp3" type="audio/mpeg"></audio>
    <audio id="sfx-correct" preload="auto"><source src="maru.mp3" type="audio/mpeg"></audio>
    <audio id="sfx-wrong" preload="auto"><source src="batu.mp3" type="audio/mpeg"></audio>

    <script>
        // --- GAS連携設定 ---
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxs2_BcYKH9RX0RzPB7upq5Bccb0mZoPLUmM4vDFKCLV68ghWDAJSP0rNooL63nAm3mKQ/exec";
        
        // データ（省略：元のファイルに含まれているものをそのまま使用）
        const DATA = { elementary: [], intermediate: [], advanced: [], devil: [] };
        const ADJECTIVES = { A:[], B:[], C:[], D:[], E:[] };
        const NOUNS = { A:[], B:[], C:[], D:[], E:[] };

        let currentMode = 'stage';
        let quizList = [];
        let currentIndex = 0;
        let score = 0;
        let playerName = "ななし";
        let questionStartTime = 0;
        let currentBgm = null;
        let isMuted = false;

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function playBgm(id) {
            const nextBgm = document.getElementById(id);
            if (!nextBgm || currentBgm === nextBgm) return;
            if (currentBgm) {
                currentBgm.pause();
                currentBgm.currentTime = 0;
            }
            currentBgm = nextBgm;
            currentBgm.volume = 0.3;
            if (!isMuted) {
                currentBgm.play().catch(e => console.log("Audio play blocked"));
            }
        }

        function toggleMute() {
            isMuted = !isMuted;
            if (isMuted) {
                if (currentBgm) currentBgm.pause();
            } else {
                if (currentBgm) currentBgm.play();
            }
            const updateIcons = (vOn, vOff) => {
                document.getElementById(vOn).classList.toggle('hidden', isMuted);
                document.getElementById(vOff).classList.toggle('hidden', !isMuted);
            };
            updateIcons('title-volume-on', 'title-volume-off');
            updateIcons('game-volume-on', 'game-volume-off');
        }

        function playSfx(id) {
            if (isMuted) return;
            const sfx = document.getElementById(id);
            sfx.currentTime = 0;
            sfx.play();
        }

        function selectMode(mode) {
            currentMode = mode;
            document.getElementById('title-screen').classList.add('hidden');
            document.getElementById(mode === 'stage' ? 'instruction-screen-stage' : 'instruction-screen-endless').classList.remove('hidden');
        }

        function showNicknameInput() {
            document.getElementById('instruction-screen-stage').classList.add('hidden');
            document.getElementById('instruction-screen-endless').classList.add('hidden');
            document.getElementById('nickname-screen').classList.remove('hidden');
        }

        function initialStart() {
            const input = document.getElementById('player-name').value.trim();
            if (input) playerName = input;
            document.getElementById('nickname-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            startNewGame();
        }

        function startNewGame() {
            const STAGES = [
                { name: "STAGE 1", data: DATA.elementary, bgm: 'bgm-stage1', color: 'bg-emerald-600' },
                { name: "STAGE 2", data: DATA.intermediate, bgm: 'bgm-stage2', color: 'bg-blue-600' },
                { name: "STAGE 3", data: DATA.advanced, bgm: 'bgm-stage3', color: 'bg-purple-600' },
                { name: "STAGE 4", data: DATA.devil, bgm: 'bgm-stage4', color: 'bg-rose-600' }
            ];

            if (currentMode === 'stage') {
                quizList = STAGES.flatMap(s => shuffle([...s.data]).slice(0, 15).map(q => ({...q, stage: s})));
            } else {
                const all = STAGES.flatMap(s => s.data.map(q => ({...q, stage: s})));
                quizList = shuffle(all).slice(0, 200);
            }

            document.getElementById('total-q-num').textContent = quizList.length;
            currentIndex = 0;
            score = 0;
            document.getElementById('total-score').textContent = "0";
            initQuiz();
        }

        function initQuiz() {
            const q = quizList[currentIndex];
            const s = q.stage;
            if (currentMode === 'stage') {
                playBgm(s.bgm);
            } else {
                playBgm('bgm-endless');
            }
            document.getElementById('question-word').textContent = q.q;
            document.getElementById('q-num').textContent = currentIndex + 1;
            const totalQ = quizList.length;
            document.getElementById('progress-bar').style.width = `${(currentIndex / totalQ) * 100}%`;
            const badge = document.getElementById('level-badge');
            badge.textContent = currentMode === 'stage' ? s.name : "ENDLESS MODE";
            badge.className = `px-4 py-1.5 ${currentMode === 'stage' ? s.color : 'bg-blue-900'} text-white text-xs rounded-full font-bold shadow-lg`;

            const choices = shuffle([q.a, ...q.d]);
            const grid = document.getElementById('choices-grid');
            grid.innerHTML = '';
            choices.forEach(text => {
                const btn = document.createElement('button');
                btn.className = "choice-btn py-5 rounded-2xl text-xl font-bold active:scale-95 transition-all";
                btn.textContent = text;
                btn.onclick = () => checkAnswer(text);
                grid.appendChild(btn);
            });
            questionStartTime = Date.now();
        }

        function checkAnswer(selected) {
            const q = quizList[currentIndex];
            const isCorrect = (selected === q.a);
            if (isCorrect) {
                playSfx('sfx-correct');
                const timeTaken = (Date.now() - questionStartTime) / 1000;
                let bonus = 0;
                let rating = "GOOD";
                let ratingColor = "text-white";
                if (timeTaken < 1.2) {
                    bonus = 500;
                    rating = "EXCELLENT!!";
                    ratingColor = "text-yellow-300";
                } else if (timeTaken < 2.5) {
                    bonus = 200;
                    rating = "GREAT!";
                    ratingColor = "text-emerald-300";
                }
                const points = 1000 + bonus;
                score += points;
                document.getElementById('total-score').textContent = score.toLocaleString();
                showFeedback(points, rating, ratingColor);
                currentIndex++;
                setTimeout(() => {
                    if (currentIndex >= quizList.length) {
                        showResult(true);
                    } else if (currentMode === 'stage' && currentIndex % 15 === 0) {
                        showStageClear();
                    } else {
                        initQuiz();
                    }
                }, 600);
            } else {
                playSfx('sfx-wrong');
                showResult(false);
            }
        }

        function showFeedback(pts, rating, color) {
            const layer = document.getElementById('feedback-layer');
            const div = document.createElement('div');
            div.className = "feedback-pop text-center";
            div.innerHTML = `
                <div class="text-4xl font-black italic ${color} drop-shadow-lg">${rating}</div>
                <div class="text-2xl font-black text-yellow-400">+${pts.toLocaleString()}</div>
            `;
            layer.appendChild(div);
            setTimeout(() => div.remove(), 800);
        }

        function showStageClear() {
            const ov = document.getElementById('overlay');
            ov.classList.remove('hidden');
            document.getElementById('ranking-container').classList.add('hidden');
            document.getElementById('score-report').classList.add('hidden');
            document.getElementById('review-box').classList.add('hidden');
            document.getElementById('overlay-icon').textContent = "🏅";
            document.getElementById('overlay-message').innerHTML = `<span class="text-emerald-400">STAGE ${currentIndex/15} クリア!</span><br>さらなる深淵へ...`;
            const bt = document.getElementById('action-btn');
            bt.textContent = "次のステージへ進む";
            bt.className = "w-full py-6 bg-emerald-600 rounded-3xl font-black text-2xl shadow-xl active:scale-95 transition-all text-white";
            bt.onclick = () => {
                ov.classList.add('hidden');
                initQuiz();
            };
        }

        function generateTitle(totalScore, solvedCount) {
            // 省略（元のロジックをそのまま使用）
            return "仮の称号";
        }

        async function showResult(isWin) {
            const ov = document.getElementById('overlay');
            ov.classList.remove('hidden');
            document.getElementById('ranking-container').classList.remove('hidden');
            document.getElementById('score-report').classList.remove('hidden');
            const title = generateTitle(score, currentIndex);
            const scoreReport = document.getElementById('score-report');
            scoreReport.innerHTML = `
                <div class="text-slate-400 text-sm mb-1">獲得称号</div>
                <div class="text-2xl font-black text-amber-400 mb-4 tracking-tighter">【${title}】</div>
                <div class="flex justify-around items-center">
                    <div>
                        <div class="text-[10px] text-slate-500 uppercase font-bold">Solved</div>
                        <div class="text-xl font-bold text-white">${currentIndex}</div>
                    </div>
                    <div class="h-8 w-px bg-slate-800"></div>
                    <div>
                        <div class="text-[10px] text-slate-500 uppercase font-bold">Score</div>
                        <div class="text-xl font-bold text-emerald-400">${score.toLocaleString()}</div>
                    </div>
                </div>
            `;

            const m = document.getElementById('overlay-message');
            const ic = document.getElementById('overlay-icon');
            const review = document.getElementById('review-box');
            if (isWin) {
                ic.textContent = "🎉";
                m.innerHTML = "完全制覇！<br><span class='text-sm text-slate-400 font-normal'>あなたは言葉の神に選ばれました</span>";
                review.classList.add('hidden');
                playBgm('bgm-ending');
            } else {
                ic.textContent = "💀";
                m.textContent = "サバイバル失敗...";
                const q = quizList[currentIndex];
                document.getElementById('rev-q').textContent = q.q;
                document.getElementById('rev-a').textContent = q.a;
                review.classList.remove('hidden');
            }

            const bt = document.getElementById('action-btn');
            bt.textContent = "ランキングを読み込み中...";
            bt.disabled = true;

            if (GAS_URL.includes("https")) {
                try {
                    const res = await fetch(GAS_URL, {
                        method: "POST",
                        body: JSON.stringify({ name: playerName, score: score, mode: currentMode, title: title, accessKey: "03162017Rfv" })
                    });
                    const rankingData = await res.json();
                    renderRanking(rankingData);
                } catch (e) {
                    console.error(e);
                }
            }
            bt.textContent = "もう一度挑戦する";
            bt.disabled = false;
            bt.onclick = () => location.reload();
        }

        function renderRanking(data) {
            const list = document.getElementById('ranking-list');
            const title = document.getElementById('ranking-title');
            title.textContent = currentMode === 'stage' ? "Stage Mode Top 10" : "Endless Mode Top 10";
            list.innerHTML = data.map((r, i) => `
                <div class="flex justify-between items-center py-4 px-4 rank-row ${r.name === playerName ? 'bg-emerald-500/20' : ''}">
                    <div class="flex items-center gap-3">
                        <span class="w-6 text-xs font-black ${i<3 ? 'text-yellow-400' : 'text-slate-500'}">${i+1}</span>
                        <div>
                            <div class="text-sm font-bold text-slate-200">${r.name}</div>
                            <div class="text-[9px] text-amber-500/80 font-bold">【${r.title || '無名の戦士'}】</div>
                        </div>
                    </div>
                    <span class="text-sm font-black text-emerald-400 font-mono">${Number(r.score).toLocaleString()}</span>
                </div>
            `).join('');
        }

        function showInstallGuide() {
            const ov = document.getElementById('overlay');
            const ic = document.getElementById('overlay-icon');
            const m = document.getElementById('overlay-message');
            const review = document.getElementById('review-box');
            const scoreReport = document.getElementById('score-report');
            const rankingContainer = document.getElementById('ranking-container');
            const bt = document.getElementById('action-btn');

            ov.classList.remove('hidden');
            ic.textContent = "📱";
            scoreReport.classList.add('hidden');
            rankingContainer.classList.add('hidden');
            review.classList.add('hidden');

            const isiOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
            if (isiOS) {
                m.innerHTML = `
                    <div class="text-left text-base space-y-4 px-2">
                        <p class="font-bold text-emerald-400 text-center text-xl mb-4">iPhone / Safari の方</p>
                        <div class="flex items-center gap-3">
                            <span class="bg-slate-700 w-6 h-6 rounded-full flex items-center justify-center text-xs">1</span>
                            <p>下部の<span class="bg-slate-700 px-2 py-1 rounded">共有ボタン（<svg class="w-4 h-4 inline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8M16 6l-4-4-4 4M12 2v13"/></svg>）</span>を押す</p>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="bg-slate-700 w-6 h-6 rounded-full flex items-center justify-center text-xs">2</span>
                            <p><span class="text-white font-bold">「ホーム画面に追加」</span>を選択</p>
                        </div>
                    </div>
                `;
            } else {
                m.innerHTML = `
                    <div class="text-left text-base space-y-4 px-2">
                        <p class="font-bold text-emerald-400 text-center text-xl mb-4">Android / Chrome の方</p>
                        <div class="flex items-center gap-3">
                            <span class="bg-slate-700 w-6 h-6 rounded-full flex items-center justify-center text-xs">1</span>
                            <p>右上の<span class="bg-slate-700 px-2 py-1 rounded">三点リーダー（⋮）</span>を押す</p>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="bg-slate-700 w-6 h-6 rounded-full flex items-center justify-center text-xs">2</span>
                            <p><span class="text-white font-bold">「アプリをインストール」</span>または<span class="text-white font-bold">「ホーム画面に追加」</span>を選択</p>
                        </div>
                    </div>
                `;
            }
            
            bt.textContent = "戻る";
            bt.className = "w-full py-6 bg-slate-700 text-white rounded-3xl font-black text-2xl shadow-xl mt-6";
            bt.onclick = () => ov.classList.add('hidden');
        }
    </script>
</body>
</html>
